name: Hourly Conflict Monitor

on:
  schedule:
    # Yeh har 60 minute (1 ghante) mein automatic chalega
    - cron: '0 * * * *'
  workflow_dispatch: # Isse aap manually bhi "Run" button daba kar check kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run News Bot
      env:
        # Security ke liye API Key yahan define ki hai
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python monitor.py
